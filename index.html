<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0B1F2A" />
<title>לוח יציאות</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&family=Rubik:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B1F2A; --panel:#11303C; --panel2:#0E2832; --line:#244653;
    --sand:#ECE5D4; --muted:#8AA6B0; --gold:#E8B04B; --teal:#4FB0A5;
    --coral:#E5654B; --orange:#E0894C;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    background:
      radial-gradient(900px 420px at 15% -10%, rgba(79,176,165,.13), transparent 60%),
      radial-gradient(900px 420px at 100% 0%, rgba(232,176,75,.10), transparent 55%),
      var(--bg);
    color:var(--sand);
    font-family:'Heebo',system-ui,-apple-system,'Arial Hebrew',sans-serif;
    line-height:1.5; padding:env(safe-area-inset-top) 0 40px;
  }
  .wrap{max-width:960px; margin:0 auto; padding:26px 16px}
  header{border-bottom:1px solid var(--line); padding-bottom:18px; margin-bottom:18px}
  h1{font-family:'Rubik',system-ui,sans-serif; font-weight:800; font-size:clamp(28px,7vw,40px); margin:0 0 4px; letter-spacing:-.5px}
  .date{font-size:13px; color:var(--muted)}
  .opp{
    margin-top:16px; background:linear-gradient(135deg,#15323d,#102832);
    border:1px solid var(--gold); border-radius:18px; padding:14px 16px;
    box-shadow:0 8px 24px rgba(0,0,0,.18);
  }
  .opp .lbl{font-size:12px; font-weight:700; color:var(--gold); display:flex; gap:6px; align-items:center}
  .opp p{margin:6px 0 0; font-size:14.5px; color:var(--sand)}
  .grid{display:grid; grid-template-columns:1fr; gap:16px}
  @media(min-width:560px){.grid{grid-template-columns:1fr 1fr}}
  @media(min-width:860px){.grid{grid-template-columns:1fr 1fr 1fr}}
  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:18px;
    overflow:hidden; display:flex; flex-direction:column;
    box-shadow:0 6px 20px rgba(0,0,0,.16); transition:transform .15s ease, box-shadow .15s ease;
  }
  .card:hover{transform:translateY(-2px); box-shadow:0 12px 28px rgba(0,0,0,.24)}
  .card.barred{opacity:.6}
  .thumb{position:relative; height:140px; background:linear-gradient(135deg,#15323d,#0E2832)}
  .thumb img{width:100%; height:100%; object-fit:cover; display:block}
  .thumb .flagBadge{
    position:absolute; bottom:8px; right:8px; background:rgba(11,31,42,.78);
    backdrop-filter:blur(2px); border-radius:99px; padding:4px 9px; font-size:18px;
    line-height:1; box-shadow:0 2px 8px rgba(0,0,0,.3);
  }
  .cardBody{padding:15px; display:flex; flex-direction:column; gap:11px}
  .crow{display:flex; align-items:flex-start; justify-content:space-between; gap:8px}
  .name{font-family:'Rubik',sans-serif; font-weight:700; font-size:20px; line-height:1.15}
  .sub{font-size:12px; color:var(--muted); margin-top:2px}
  .code{font-size:12px; color:var(--muted); font-family:'Heebo',monospace; letter-spacing:1px}
  .visaRow{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
  .visaTag{font-size:10.5px; font-weight:700; color:var(--muted); letter-spacing:.5px; text-transform:uppercase; display:flex; align-items:center; gap:4px}
  .pill{font-size:12px; font-weight:700; padding:4px 11px; border-radius:99px; border:1px solid currentColor; display:inline-flex; align-items:center; gap:4px}
  .pill.solid{color:var(--bg)!important}
  .days{font-size:12px; color:var(--muted)}
  .summary{font-size:13px; color:var(--sand)}
  .note{font-size:12px; color:var(--orange); line-height:1.45}
  .facts{display:flex; gap:18px; border-top:1px solid var(--line); padding-top:10px}
  .fact .fl{font-size:11px; color:var(--muted)}
  .fact .fv{font-size:15px; font-weight:700}
  .hl{font-size:12.5px; color:var(--sand); background:rgba(79,176,165,.08); border-radius:10px; padding:8px 10px}
  .flightBox{
    display:flex; align-items:center; gap:10px; text-decoration:none; color:inherit;
    background:var(--panel2); border:1px dashed var(--teal); border-radius:12px; padding:9px 11px;
    transition:background .15s ease;
  }
  .flightBox:hover{background:#102e36}
  .flightIcon{font-size:18px}
  .flightText{font-size:12.5px; flex:1}
  .flightText b{display:block; font-size:13px; color:var(--sand)}
  .flightArrow{font-size:18px; color:var(--teal)}
  .src{font-size:11px; color:var(--muted); margin-top:auto}
  footer{margin-top:24px; border-top:1px solid var(--line); padding-top:14px; font-size:12px; color:var(--muted)}
  @media(prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>לוח יציאות</h1>
    <div class="date" id="date"></div>
    <div class="opp" id="opp" hidden>
      <div class="lbl">🌟 ההזדמנות של היום</div>
      <p id="oppText"></p>
    </div>
  </header>

  <div class="grid" id="grid"></div>

  <footer>
    הדף מתרענן אוטומטית פעם ביום על ידי המשימה ב‑Cowork. מחירי טיסות הם הערכה גסה —
    התראות Google Flights תופסות דילים בזמן אמת. ויזות מאומתות מול מקור עדכני בכל ריצה.
  </footer>
</div>

<!-- ===== BOARD DATA — Cowork מעדכן רק את ה-JSON בין שני התגים האלה ===== -->

    {"id":"ph","nameHe":"פיליפינים","nameEn":"Philippines","code":"MNL","flag":"🇵🇭","continent":"אסיה","visaStatus":"open","visaSummary":"ללא ויזה, 59 יום — הסכם דו-צדדי מיוחד עם ישראל מ-1957/58 (לא ה-30 יום הגנרי שמופיע ברוב המקורות). צריך דרכון בתוקף 6 חודשים וכרטיס המשך.","note":"","maxDays":"59","costPerDay":"~$25–35","flightEstimate":"~$400–650","highlight":"לגונות תכולות ואיים סלעיים בפלאוואן · צלילה עם כרישי לווייתן · קורון השקועה","sources":["dfa.gov.ph"],"tracked":true},
    {"id":"th","nameHe":"תאילנד","nameEn":"Thailand","code":"BKK","flag":"🇹🇭","continent":"אסיה","visaStatus":"watch","visaSummary":"כרגע פטור ויזה ל-60 יום (אוטומטי), ניתן להאריך ב-30 (1,900 בהט).","note":"הממשלה אישרה ב-19.5.2026 קיצוץ ל-30 יום, טרם פורסם ברשומות הרשמיות — עלול להיכנס לתוקף בכל רגע לפני אוגוסט. צריך TDAC תוך 72ש' לפני הנחיתה.","maxDays":"60","costPerDay":"~$35–55","flightEstimate":"~$400–650","highlight":"איי סימילן וקו-טאו לצלילה · חופי האנדמן · חיי לילה ותרמילאות עולמיים","sources":["thaiembassy.org","tatnews.org"],"tracked":false},

<!-- ===== END BOARD DATA ===== -->

<script>
  var STATUS = {
    open:  {label:"ויזה: פתוחה",     color:"#E8B04B", solid:true},
    evisa: {label:"ויזה: e-Visa",    color:"#4FB0A5", solid:false},
    watch: {label:"ויזה: בשינוי",    color:"#E0894C", solid:false},
    hard:  {label:"ויזה: מורכבת",    color:"#E0894C", solid:false},
    barred:{label:"ויזה: חסומה",     color:"#E5654B", solid:false},
    unknown:{label:"ויזה: לא ידוע",  color:"#8AA6B0", solid:false}
  };
  // תמונות נוף ייצוגיות לכל יעד (Wikimedia Commons). לא חלק מ-board-data כדי לא לגעת בסכמה שהמשימה היומית תלויה בה.
  var IMAGES = {
    vn: "https://commons.wikimedia.org/wiki/Special:FilePath/Halong_Bay_in_Vietnam.jpg?width=640",
    ph: "https://commons.wikimedia.org/wiki/Special:FilePath/El_Nido_Bay,_islands,_Palawan,_Philippines.jpg?width=640",
    th: "https://commons.wikimedia.org/wiki/Special:FilePath/Mu_Ko_Similan_National_Park_Thailand.jpg?width=640",
    ke: "https://commons.wikimedia.org/wiki/Special:FilePath/Wildebeest_Migration_Masai_mara.jpg?width=640"
  };
  function esc(s){var d=document.createElement('div'); d.textContent=s==null?'':String(s); return d.innerHTML;}
  // קישור חיפוש כללי ב-Google Flights לאוגוסט; אם בעתיד board-data יכלול flightUrl/flightPrice/flightStops ספציפיים, התצוגה תשתמש בהם במקום.
  function flightSearchUrl(d){
    var q = 'טיסות מתל אביב ל' + d.nameHe + ' באוגוסט 2026';
    return 'https://www.google.com/travel/flights?hl=he&q=' + encodeURIComponent(q);
  }
  function render(){
    var data;
    try{ data = JSON.parse(document.getElementById('board-data').textContent); }
    catch(e){ document.getElementById('grid').innerHTML = '<div style="color:#E5654B">שגיאה בטעינת הנתונים.</div>'; return; }
    document.getElementById('date').textContent = 'עודכן ' + (data.lastUpdated||'');
    if(data.opportunity){ document.getElementById('opp').hidden=false; document.getElementById('oppText').textContent = data.opportunity; }
    var grid = document.getElementById('grid'); grid.innerHTML='';
    (data.destinations||[]).forEach(function(d){
      var s = STATUS[d.visaStatus] || STATUS.unknown;
      var pillStyle = s.solid ? 'color:'+s.color+';background:'+s.color : 'color:'+s.color;
      var img = IMAGES[d.id];
      var flightUrl = d.flightUrl || flightSearchUrl(d);
      var flightDetail = (d.flightPrice || d.flightStops)
        ? [d.flightPrice, d.flightStops].filter(Boolean).join(' · ')
        : 'חפש טיסה מומלצת לאוגוסט';
      var card = document.createElement('div');
      card.className = 'card' + (d.visaStatus==='barred'?' barred':'');
      card.innerHTML =
        '<div class="thumb">'+
          (img ? '<img src="'+esc(img)+'" alt="נוף מ'+esc(d.nameHe)+'" loading="lazy">' : '')+
          '<div class="flagBadge">'+esc(d.flag)+'</div>'+
        '</div>'+
        '<div class="cardBody">'+
        '<div class="crow"><div>'+
          '<div class="name">'+esc(d.nameHe)+'</div>'+
          '<div class="sub">'+esc(d.nameEn)+' · '+esc(d.continent)+'</div>'+
        '</div><div class="code">'+esc(d.code)+'</div></div>'+
        '<div class="visaRow"><span class="visaTag">🛂 סטטוס ויזה</span>'+
          '<span class="pill'+(s.solid?' solid':'')+'" style="'+pillStyle+'">'+esc(s.label)+'</span>'+
          (d.maxDays && d.maxDays!=='—' ? '<span class="days">· עד '+esc(d.maxDays)+' יום</span>':'')+
        '</div>'+
        (d.visaSummary ? '<div class="summary">'+esc(d.visaSummary)+'</div>':'')+
        (d.note ? '<div class="note">⚠ '+esc(d.note)+'</div>':'')+
        '<div class="facts">'+
          '<div class="fact"><div class="fl">עלות/יום</div><div class="fv" style="color:#4FB0A5">'+esc(d.costPerDay||'—')+'</div></div>'+
          '<div class="fact"><div class="fl">טיסה (הערכה)</div><div class="fv" style="color:#E8B04B">'+esc(d.flightEstimate||'—')+'</div></div>'+
        '</div>'+
        (d.highlight && d.highlight!=='—' ? '<div class="hl">✨ '+esc(d.highlight)+'</div>':'')+
        '<a class="flightBox" href="'+esc(flightUrl)+'" target="_blank" rel="noopener">'+
          '<span class="flightIcon">✈️</span>'+
          '<span class="flightText"><b>טיסה מומלצת · אוגוסט</b><span>'+esc(flightDetail)+'</span></span>'+
          '<span class="flightArrow">‹</span>'+
        '</a>'+
        '<div class="src">'+(d.sources&&d.sources.length?'מקור: '+esc(d.sources.join(', ')):'')+'</div>'+
        '</div>';
      grid.appendChild(card);
    });
  }
  render();
</script>
</body>
</html>
